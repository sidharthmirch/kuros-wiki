<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Map — Kuro's Wiki</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='25' font-size='28' font-family='Source Serif 4,Georgia,serif' font-style='italic'%3EW%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wikipedia.css">
<style>
  /* ── Dark dungeon override ─────────────────────────────────── */
  /* Light mode (default) — matches wiki editorial surface */
  :root {
    --dg-bg: #fbfaf5;
    --dg-bg2: #f5f3ec;
    --dg-surface: #ffffff;
    --dg-surface2: #f0ede4;
    --dg-border: #e3dccb;
    --dg-border-glow: #d4cbb5;
    --dg-text: #1a1612;
    --dg-text-dim: rgba(26, 22, 18, 0.5);
    --dg-text-ghost: rgba(26, 22, 18, 0.18);
    --dg-maroon: #7a1f1f;
    --dg-maroon-bright: #a03030;
    --dg-teal: #1a7a6e;
    --dg-teal-dim: rgba(26, 122, 110, 0.25);
    --dg-gold: #9a6a2a;
    --dg-gold-bright: #b87d30;
    --dg-cream: #1a1612;
    --dg-cat-question: #4a7ca6;
    --dg-cat-concept: #4f8a6d;
    --dg-cat-entity: #c77a3c;
    --dg-cat-source: #8d6ba3;
    --dg-cat-special: #9a8a77;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --dg-bg: #0a1214;
      --dg-bg2: #0f1a1d;
      --dg-surface: #132024;
      --dg-surface2: #1a2c31;
      --dg-border: #1e3338;
      --dg-border-glow: #2a4a50;
      --dg-text: #FAF0E6;
      --dg-text-dim: rgba(250, 240, 230, 0.5);
      --dg-text-ghost: rgba(250, 240, 230, 0.2);
      --dg-maroon: #722F37;
      --dg-maroon-bright: #a34450;
      --dg-teal: #2A9D8F;
      --dg-teal-dim: rgba(42, 157, 143, 0.35);
      --dg-gold: #C4813D;
      --dg-gold-bright: #e0a050;
      --dg-cream: #FAF0E6;
      --dg-cat-question: #5a9cc6;
      --dg-cat-concept: #5aaa7d;
      --dg-cat-entity: #d89a5c;
      --dg-cat-source: #ad8bc3;
      --dg-cat-special: #baa997;
    }
  }

  html, body { height: 100%; }
  body.page-map {
    overflow: hidden;
    background: var(--dg-bg);
  }

  /* Masthead removed — map uses its own nav toggle */
  body.page-map #search-results a {
    color: var(--dg-text);
    border-bottom-color: var(--dg-border);
  }
  body.page-map #search-results a:hover {
    background: var(--dg-surface2);
  }
  body.page-map #search-results .hint { color: var(--dg-text-dim); }

  .map-root {
    position: fixed;
    top: 0;
    left: 0; right: 0; bottom: 0;
    background: var(--dg-bg);
  }
  #map-canvas {
    width: 100%; height: 100%;
    display: block;
    cursor: grab;
    touch-action: manipulation;
  }
  #map-canvas:active { cursor: grabbing; }

  /* ── Panels ────────────────────────────────────────────────── */
  .map-panel {
    position: absolute;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border);
    border-radius: 3px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--dg-text);
  }

  /* ── Legend ─────────────────────────────────────────────────── */
  .map-legend {
    top: 18px; right: 18px;
    padding: 12px 14px;
    min-width: 180px;
    z-index: 100;
    transition: right 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .map-legend h4 {
    margin: 0 0 8px;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--dg-text-dim);
    font-weight: 600;
  }
  .map-legend ul { list-style: none; padding: 0; margin: 0; }
  .map-legend li {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.2s ease;
  }
  .map-legend li.dimmed { opacity: 0.25; }
  .map-legend li:hover { opacity: 0.8; }
  .map-legend li.dimmed:hover { opacity: 0.4; }
  .map-legend .dot {
    width: 8px; height: 8px; border-radius: 2px;
    display: inline-block; flex: 0 0 auto;
  }
  .map-legend .bracket {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--dg-text-dim);
    min-width: 2.2em;
    text-align: center;
  }
  .map-legend .count {
    margin-left: auto;
    color: var(--dg-text-dim);
    font-variant-numeric: tabular-nums;
  }
  .map-legend .reset-btn {
    display: block;
    margin-top: 8px;
    padding: 3px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dg-teal);
    background: transparent;
    border: 1px solid var(--dg-teal-dim);
    border-radius: 2px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .map-legend .reset-btn:hover {
    background: rgba(42, 157, 143, 0.12);
    border-color: var(--dg-teal);
    color: var(--dg-cream);
  }

  /* ── Help ───────────────────────────────────────────────────── */
  .map-help {
    bottom: 52px; left: 50%;
    transform: translateX(-50%);
    padding: 6px 10px;
    color: var(--dg-text-ghost);
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    white-space: nowrap;
    pointer-events: none;
  }

  /* ── Stats ──────────────────────────────────────────────────── */
  .map-stats {
    top: 18px; left: 18px;
    padding: 8px 12px;
    color: var(--dg-text-dim);
    font-size: 0.7rem;
    font-variant-numeric: tabular-nums;
  }
  .map-stats strong { color: var(--dg-gold); font-weight: 600; }

  /* ── Nav toggle ─────────────────────────────────────────────── */
  .map-nav-toggle {
    position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    display: flex;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border);
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    z-index: 100;
  }
  .map-nav-toggle a {
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.66rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dg-text-dim);
    text-decoration: none;
    border: none;
    border-right: 1px solid var(--dg-border);
    transition: background 0.15s, color 0.15s;
  }
  .map-nav-toggle a:last-child { border-right: none; }
  .map-nav-toggle a:hover { background: var(--dg-surface2); color: var(--dg-text); }
  .map-nav-toggle a.active {
    background: var(--dg-text);
    color: var(--dg-bg);
  }

  /* ── HUD Breadcrumb bar ─────────────────────────────────────── */
  .map-hud {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 44px;
    background: var(--dg-surface);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid var(--dg-border);
    display: flex;
    align-items: center;
    padding: 0 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--dg-text-dim);
    z-index: 150;
    transition: opacity 0.2s ease;
    overflow: hidden;
    gap: 6px;
  }
  .map-hud.empty { opacity: 0.4; }
  .hud-node {
    color: var(--dg-gold);
    font-weight: 600;
    white-space: nowrap;
  }
  .hud-sep {
    color: var(--dg-text-ghost);
    margin: 0 2px;
  }
  .hud-cat {
    color: var(--dg-text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 0.58rem;
    white-space: nowrap;
  }
  .hud-neighbors {
    display: flex;
    gap: 6px;
    overflow: hidden;
    flex-shrink: 1;
  }
  .hud-neighbor {
    color: var(--dg-teal);
    white-space: nowrap;
    font-size: 0.65rem;
  }
  .hud-label {
    color: var(--dg-text-ghost);
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .hud-zoom {
    margin-left: auto;
    color: var(--dg-text-ghost);
    font-size: 0.6rem;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* ── Tooltip ────────────────────────────────────────────────── */
  .map-tooltip {
    position: fixed;
    z-index: 300;
    width: 22rem;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border-glow);
    border-radius: 3px;
    padding: 0.85rem 1.05rem;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15), 0 0 1px rgba(26, 122, 110, 0.2);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--dg-text);
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .map-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .map-tooltip .tip-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.56rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 0.3rem;
  }
  .map-tooltip .tip-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic;
    font-size: 1.02rem;
    font-weight: 500;
    margin: 0 0 0.4rem;
    color: var(--dg-cream);
    line-height: 1.2;
  }
  .map-tooltip .tip-lead {
    color: var(--dg-text-dim);
    margin: 0;
    font-size: 0.82rem;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Mini-map ───────────────────────────────────────────────── */
  .map-minimap {
    position: absolute;
    bottom: 62px;
    right: 18px;
    width: 160px;
    height: 100px;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border);
    border-radius: 3px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    z-index: 90;
    transition: right 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  #minimap-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Stacking panels (Obsidian Publish style) ──────────────── */
  .panel-overlay {
    position: absolute;
    top: 0; right: 0; bottom: 44px;
    display: flex;
    flex-direction: row-reverse;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
  }
  .stack-panel {
    pointer-events: auto;
    width: 380px;
    min-width: 380px;
    height: 100%;
    background: var(--dg-bg2);
    border-left: 1px solid var(--dg-border);
    border-top: 1px solid var(--dg-border);
    box-shadow: -8px 0 32px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }
  .stack-panel.visible {
    transform: translateX(0);
  }
  .stack-panel.stacked {
    width: 360px;
    min-width: 360px;
    margin-right: -20px;
    opacity: 0.85;
  }
  .panel-header {
    padding: 22px 18px 14px;
    border-bottom: 1px solid var(--dg-border);
    flex-shrink: 0;
  }
  .panel-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 24px; height: 24px;
    background: transparent;
    border: 1px solid var(--dg-border);
    border-radius: 2px;
    color: var(--dg-text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .panel-close:hover {
    background: var(--dg-maroon);
    border-color: var(--dg-maroon);
    color: var(--dg-cream);
  }
  .panel-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.56rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }
  .panel-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--dg-cream);
    line-height: 1.25;
    margin: 0;
    padding-right: 30px;
  }
  .panel-body {
    padding: 16px 18px;
    overflow-y: auto;
    flex: 1;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--dg-text-dim);
  }
  .panel-body p { margin: 0 0 1em; }
  .panel-body h3 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--dg-cream);
    margin: 1.4em 0 0.5em;
    line-height: 1.3;
  }
  .panel-body h3:first-child { margin-top: 0; }
  .panel-body strong {
    color: var(--dg-cream);
    font-weight: 600;
  }
  .panel-body em {
    font-style: italic;
    color: rgba(250, 240, 230, 0.72);
  }
  .panel-body a {
    color: var(--dg-teal);
    text-decoration: none;
    border-bottom: 1px solid var(--dg-teal-dim);
    transition: border-color 0.15s;
  }
  .panel-body a:hover {
    border-bottom-color: var(--dg-teal);
  }
  .panel-body cite {
    font-style: normal;
    color: var(--dg-text-dim);
    font-size: 0.82rem;
  }
  .panel-nav {
    padding: 12px 18px;
    border-top: 1px solid var(--dg-border);
    flex-shrink: 0;
  }
  .panel-nav a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dg-teal);
    text-decoration: none;
    transition: color 0.15s;
  }
  .panel-nav a:hover { color: var(--dg-gold); }
  .panel-nav a::after { content: " \2192"; }

  /* ── Zoom controls ──────────────────────────────────────────── */
  .map-zoom-controls {
    position: absolute;
    bottom: 62px;
    left: 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 100;
  }
  .map-zoom-btn {
    width: 28px;
    height: 28px;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border);
    border-radius: 3px;
    color: var(--dg-cream);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    padding: 0;
  }
  .map-zoom-btn:hover {
    border-color: var(--dg-teal);
    box-shadow: 0 0 6px rgba(42, 157, 143, 0.25);
    background: var(--dg-surface2);
  }
  .map-zoom-level {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    color: var(--dg-text-ghost);
    text-align: center;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Reduced motion ─────────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .stack-panel { transition-duration: 0.01ms !important; }
    .map-tooltip { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body class="page-map">
<div class="map-root">
  <canvas id="map-canvas"></canvas>
  <div class="map-nav-toggle">
    <a href="map.html" class="active">Map</a>
    <a href="map-3d.html">3D</a>
    <a href="graph.html">Classic</a>
  </div>
  <div class="map-panel map-stats" id="map-stats"></div>
  <div class="map-panel map-legend">
    <h4>Rooms</h4>
    <ul id="legend-items"></ul>
    <button class="reset-btn" id="legend-reset" style="display:none">Show all</button>
  </div>
  <div class="map-panel map-help">scroll zoom / drag pan / hover info / click panel / dblclick editorial / arrows navigate / R editorial / esc clear</div>
  <div class="map-minimap">
    <canvas id="minimap-canvas"></canvas>
  </div>
  <div class="map-zoom-controls" id="zoom-controls">
    <button class="map-zoom-btn" id="zoom-in-btn" title="Zoom in">+</button>
    <button class="map-zoom-btn" id="zoom-out-btn" title="Zoom out">&minus;</button>
    <button class="map-zoom-btn" id="zoom-fit-btn" title="Zoom to fit">1</button>
    <button class="map-zoom-btn" id="zoom-read-btn" title="Editorial mode">R</button>
    <div class="map-zoom-level" id="zoom-level-label">1.0x</div>
  </div>
  <div class="panel-overlay" id="panel-overlay"></div>
  <div class="map-hud empty" id="map-hud">
    <span class="hud-label">explore the map</span>
    <span class="hud-zoom" id="hud-zoom">1.0x</span>
  </div>
</div>
<div class="map-tooltip" id="map-tooltip"></div>
<script src="app.js"></script>
<script>
window.__MAP_DATA__ = __MAP_DATA_PLACEHOLDER__;
window.__PREVIEWS_DATA__ = __PREVIEWS_DATA_PLACEHOLDER__;
window.__GRAPH_DATA__ = __GRAPH_DATA_PLACEHOLDER__;
</script>
<script type="module">
import { prepareWithSegments, layoutWithLines, layoutNextLine } from 'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.4/+esm';

(function () {
  // ── Theme palette — reads CSS variables so light/dark mode works automatically ──
  var cs = getComputedStyle(document.documentElement);
  function cssVar(name) { return cs.getPropertyValue(name).trim(); }
  var DG = {
    bg:           cssVar('--dg-bg'),
    surface:      cssVar('--dg-surface'),
    border:       cssVar('--dg-border'),
    borderGlow:   cssVar('--dg-border-glow'),
    text:         cssVar('--dg-text'),
    textDim:      cssVar('--dg-text-dim'),
    textGhost:    cssVar('--dg-text-ghost'),
    maroon:       cssVar('--dg-maroon'),
    maroonBright: cssVar('--dg-maroon-bright'),
    teal:         cssVar('--dg-teal'),
    tealDim:      cssVar('--dg-teal-dim'),
    gold:         cssVar('--dg-gold'),
    goldBright:   cssVar('--dg-gold-bright'),
    cream:        cssVar('--dg-cream'),
  };

  // ── Category colors — read from CSS variables ──
  var COLORS = {
    question:   cssVar('--dg-cat-question'),
    concept:    cssVar('--dg-cat-concept'),
    entity:     cssVar('--dg-cat-entity'),
    source:     cssVar('--dg-cat-source'),
    special:    cssVar('--dg-cat-special')
  };
  var CATEGORY_LABELS = {
    question:   "Open Questions",
    concept:    "Concepts",
    entity:     "Entities",
    source:     "Sources",
    special:    "Meta",
  };
  var BRACKETS = {
    question:   ["<", ">"],
    concept:    ["(", ")"],
    entity:     ["[", "]"],
    source:     ["[", "]"],
    special:    ["{", "}"],
  };

  // ── State ──
  var nodes = [];
  var edges = [];
  var nodeById = {};
  var neighbors = {};
  var edgeWeights = {};
  var previews = null;
  var hoverId = null;
  var hoverNode = null;
  var searchHighlightId = null;
  var selectedNodeId = null;
  var activeCategories = new Set(Object.keys(COLORS));
  var hiddenNodes = new Set();
  var stackPanels = [];  // [{nodeId, el}]
  var pretextCache = {};
  var pulsePhase = 0;    // for animated glow
  var animFrameId = null;

  // ── Canvas + transform ──
  var canvas = document.getElementById("map-canvas");
  var ctx = canvas.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var W, H;

  var panX = 0, panY = 0, zoom = 1;
  var targetZoom = 1, targetPanX = 0, targetPanY = 0;
  var animating = false;
  var dragging = false, didDrag = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

  // ── Layout constants ──
  var CELL_W = 200;
  var CELL_H = 80;
  var FONT_SIZE = 13;
  var PREVIEW_FONT_SIZE = 11;
  var PREVIEW_LINE_HEIGHT = 15;
  var ZOOM_PREVIEW_THRESHOLD = 2.0;
  var ZOOM_EDITORIAL_THRESHOLD = 4.0;
  var PREVIEW_MAX_H = 50;  // max extra height for preview text (keeps boxes from overlapping)
  var MONO = "'JetBrains Mono', monospace";
  var SERIF = "'Source Serif 4', Georgia, serif";

  // ── Editorial mode state ──
  var editorialNodeId = null;       // which node is in editorial mode
  var editorialFade = 0;            // 0..1 transition progress
  var editorialFadeTarget = 0;
  var editorialFadeStart = 0;
  var editorialFadeStartTime = 0;

    // compute the per-gap stretch the justifier would introduce, and only bail out
    // when that stretch would exceed a multiplicative cap relative to the normal

    // bit short gets justified cleanly; a line that's dramatically short falls back
    // to left-alignment.

    // visible text perfectly.

        ctx.fillText(styledWords[i].word, cx2, y);

  // Draw a line of editorial text with inline formatting (fallback for non-justified contexts)

    var statsEl = document.getElementById("map-stats");
    var helpEl = document.querySelector(".map-help");
    var minimapEl = document.querySelector(".map-minimap");
    var navToggleEl = document.querySelector(".map-nav-toggle");

  }

  function drawFrame() {

        n._boxH = n._baseBoxH + extraH;

      var sn = nodeById[e.source], tn = nodeById[e.target];

      ctx.shadowBlur = (8 * pulse) / zoom;
      ctx.fillStyle = "rgba(0,0,0,0)";

    ctx.fillStyle = textColor;

    ctx.fillStyle = bracketColor;
    ctx.fillText(bracketR, startX + blW + innerW, labelY);

  // ── Layout ──

      n._baseBoxH = FONT_SIZE + 16;

  }

  function centerView() {
    if (!nodes.length) return;

    for (var i = 0; i < nodes.length; i++) {

      maxX = Math.max(maxX, n._wx + n._boxW / 2);

  function resize() {

  function drawMinimap() {

  // ── Minimap interaction ──
  var mmDragging = false;

  function minimapToWorld(mmX, mmY) {
    var t = mmTransform;
    var worldX = (mmX - t.pad) / t.scale + t.minX;
    var worldY = (mmY - t.pad) / t.scale + t.minY;
    return [worldX, worldY];
  }

  function panFromMinimap(e) {
    var rect = mmCvs.getBoundingClientRect();
    var mmX = (e.clientX - rect.left) * (MM_W / rect.width);
    var mmY = (e.clientY - rect.top) * (MM_H / rect.height);
    var world = minimapToWorld(mmX, mmY);
    panX = W / 2 - world[0] * zoom;
    panY = H / 2 - world[1] * zoom;
    scheduleRedraw();
  }

  mmCvs.addEventListener("mousedown", function(e) {
    e.preventDefault();
    e.stopPropagation();
    mmDragging = true;
    panFromMinimap(e);
  });

  window.addEventListener("mousemove", function(e) {
    if (!mmDragging) return;
    e.preventDefault();
    panFromMinimap(e);
  });

  window.addEventListener("mouseup", function(e) {
    if (mmDragging) {
      mmDragging = false;
      e.stopPropagation();
    }
  });

  // ── HUD ──
  var hud = document.getElementById("map-hud");
  var hudZoomEl = document.getElementById("hud-zoom");

  function updateHud(node) {
    if (!node || hiddenNodes.has(node.id)) {
      hud.classList.add("empty");
      hud.innerHTML = '<span class="hud-label">explore the map</span><span class="hud-zoom" id="hud-zoom">' + zoom.toFixed(1) + 'x</span>';
      hudZoomEl = document.getElementById("hud-zoom");
      return;
    }
    hud.classList.remove("empty");
    var cat = node.category;
    var color = COLORS[cat] || "#baa997";
    var brk = BRACKETS[cat] || ["[", "]"];
    var catLabel = CATEGORY_LABELS[cat] || cat;

    // Get top neighbors by val
    var nids = neighbors[node.id] || {};
    var neighborNodes = [];
    for (var nid in nids) {
      if (!hiddenNodes.has(nid)) neighborNodes.push(nodeById[nid]);
    }
    neighborNodes.sort(function(a, b) { return (b.val || 0) - (a.val || 0); });
    neighborNodes = neighborNodes.slice(0, 5);

    var html = '<span class="hud-node" style="color:' + color + '">' +
      escapeHtml(brk[0] + " " + node.label + " " + brk[1]) + '</span>' +
      '<span class="hud-sep">\u2192</span>' +
      '<span class="hud-cat" style="color:' + color + '">' + escapeHtml(catLabel) + '</span>';

    if (neighborNodes.length > 0) {
      html += '<span class="hud-sep">\u2502</span><span class="hud-label">linked:</span>';
      html += '<span class="hud-neighbors">';
      for (var i = 0; i < neighborNodes.length; i++) {
        var nn = neighborNodes[i];
        var nbrk = BRACKETS[nn.category] || ["[", "]"];
        var ncolor = COLORS[nn.category] || "#baa997";
        html += '<span class="hud-neighbor" style="color:' + ncolor + '">' +
          escapeHtml(nbrk[0] + nn.label + nbrk[1]) + '</span>';
      }
      html += '</span>';
    }
    html += '<span class="hud-zoom" id="hud-zoom">' + zoom.toFixed(1) + 'x</span>';
    hud.innerHTML = html;
    hudZoomEl = document.getElementById("hud-zoom");
  }

  function updateHudZoom() {
    if (hudZoomEl) hudZoomEl.textContent = zoom.toFixed(1) + "x";
    var zlLabel = document.getElementById("zoom-level-label");
    if (zlLabel) zlLabel.textContent = zoom.toFixed(1) + "x";
  }

  // ── Stacking panels ──
  var panelOverlay = document.getElementById("panel-overlay");

  function openPanel(nodeId) {
    var p = previews && previews[nodeId];
    var node = nodeById[nodeId];
    if (!node) return;

    // Don't open duplicate
    for (var i = 0; i < stackPanels.length; i++) {
      if (stackPanels[i].nodeId === nodeId) return;
    }

    // Mark previous panels as stacked
    for (var i = 0; i < stackPanels.length; i++) {
      stackPanels[i].el.classList.add("stacked");
    }

    // Max 2 panels
    if (stackPanels.length >= 2) {
      var oldest = stackPanels.shift();
      oldest.el.remove();
    }

    var cat = node.category;
    var color = COLORS[cat] || "#baa997";
    var catLabel = CATEGORY_LABELS[cat] || cat;

    var panel = document.createElement("div");
    panel.className = "stack-panel";
    panel.innerHTML =
      '<div class="panel-header">' +
        '<button class="panel-close" data-nid="' + nodeId + '">\u00D7</button>' +
        '<div class="panel-cat" style="color:' + color + '">' + escapeHtml(catLabel) + '</div>' +
        '<h3 class="panel-title">' + escapeHtml(p ? p.title : node.label) + '</h3>' +
      '</div>' +
      '<div class="panel-body">' + (p && p.rich ? formatRich(p.rich) : formatLead(p ? p.lead : "")) + '</div>' +
      '<div class="panel-nav"><a href="' + (node.href || "#") + '">Open full page</a></div>';

    panelOverlay.appendChild(panel);
    // Trigger reflow then animate in
    panel.offsetHeight;
    panel.classList.add("visible");

    // Close handler
    panel.querySelector(".panel-close").addEventListener("click", function() {
      closePanel(nodeId);
    });

    stackPanels.push({ nodeId: nodeId, el: panel });
    repositionUI();
  }

  function repositionUI() {
    var hasPanel = stackPanels.length > 0;
    var legendEl = document.querySelector(".map-legend");
    var minimapEl = document.querySelector(".map-minimap");
    // Calculate total panel width so we can tuck legend/minimap just left of panels
    var panelWidth = 0;
    if (hasPanel) {
      panelWidth = 380; // first panel
      if (stackPanels.length > 1) panelWidth += (stackPanels.length - 1) * 340; // stacked panels overlap by 20px
    }
    var rightOffset = hasPanel ? (panelWidth + 18) + "px" : "18px";
    if (legendEl) {
      legendEl.style.right = rightOffset;
      legendEl.style.left = "auto";
    }
    if (minimapEl) {
      minimapEl.style.right = rightOffset;
      minimapEl.style.left = "auto";
    }
  }

  function closePanel(nodeId) {
    for (var i = stackPanels.length - 1; i >= 0; i--) {
      if (stackPanels[i].nodeId === nodeId) {
        stackPanels[i].el.classList.remove("visible");
        var el = stackPanels[i].el;
        setTimeout(function() { el.remove(); }, 300);
        stackPanels.splice(i, 1);
        break;
      }
    }
    // Unstack the last remaining panel
    if (stackPanels.length > 0) {
      stackPanels[stackPanels.length - 1].el.classList.remove("stacked");
    }
    repositionUI();
  }

  function closeAllPanels() {
    for (var i = 0; i < stackPanels.length; i++) {
      stackPanels[i].el.classList.remove("visible");
      var el = stackPanels[i].el;
      setTimeout(function() { el.remove(); }, 300);
    }
    stackPanels = [];
    repositionUI();
  }

  // Close panels when clicking on canvas background
  canvas.addEventListener("mousedown", function(e) {
    // Will be handled in click if not drag
  });

  // ── Filter ──
  function applyFilter() {
    hiddenNodes.clear();
    for (var i = 0; i < nodes.length; i++) {
      if (!activeCategories.has(nodes[i].category)) hiddenNodes.add(nodes[i].id);
    }
    if (hoverId && hiddenNodes.has(hoverId)) { hoverId = null; hoverNode = null; hideTooltip(); }
    if (selectedNodeId && hiddenNodes.has(selectedNodeId)) selectedNodeId = null;
    if (searchHighlightId && hiddenNodes.has(searchHighlightId)) searchHighlightId = null;
    scheduleRedraw();
    updateStats();
  }

  function updateStats() {
    var vn = nodes.filter(function(n) { return !hiddenNodes.has(n.id); });
    var ve = edges.filter(function(e) { return !hiddenNodes.has(e.source) && !hiddenNodes.has(e.target); });
    document.getElementById("map-stats").innerHTML =
      '<strong>' + vn.length + '</strong> rooms &middot; <strong>' + ve.length + '</strong> connections';
  }

  // ── Search ──
  var searchInput = document.getElementById("search-input");

  function findNode(q) {
    if (!q) return null;
    q = q.toLowerCase().trim();
    if (!q) return null;
    for (var i = 0; i < nodes.length; i++) {
      if (!hiddenNodes.has(nodes[i].id) && nodes[i].id === q) return nodes[i];
    }
    for (var i = 0; i < nodes.length; i++) {
      if (!hiddenNodes.has(nodes[i].id) && nodes[i].label.toLowerCase().startsWith(q)) return nodes[i];
    }
    for (var i = 0; i < nodes.length; i++) {
      if (!hiddenNodes.has(nodes[i].id) && nodes[i].label.toLowerCase().indexOf(q) !== -1) return nodes[i];
    }
    if (previews) {
      for (var i = 0; i < nodes.length; i++) {
        var p = previews[nodes[i].id];
        if (p && !hiddenNodes.has(nodes[i].id) && p.title && p.title.toLowerCase().indexOf(q) !== -1) return nodes[i];
      }
    }
    return null;
  }

  if (searchInput) {
    searchInput.addEventListener("input", function() {
      var q = searchInput.value;
      if (!q || !q.trim()) { searchHighlightId = null; scheduleRedraw(); return; }
      var match = findNode(q);
      if (match) { searchHighlightId = match.id; updateHud(match); panToNode(match); }
      else { searchHighlightId = null; scheduleRedraw(); }
    });
    searchInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && searchHighlightId) {
        var node = nodeById[searchHighlightId];
        if (node && node.href) { window.location = node.href; return; }
      }
      if (e.key === "Escape") {
        searchHighlightId = null;
        searchInput.value = "";
        searchInput.blur();
        scheduleRedraw();
      }
    });
  }

  // ── Mouse events ──
  // Hit-test the live editorial pull quote in screen coordinates. Returns true if
  // the point lies inside the floating quote block (including its drag hit-padding).
  function quoteAt(sx, sy) {
    if (editorialFade < 0.5 || !editorialNodeId) return false;
    var lay = getEditorialLayout(editorialNodeId);
    if (!lay || !lay.draggableQuote) return false;
    if (typeof lay._quoteScreenX !== "number") return false;
    var pad = 8;
    return sx >= lay._quoteScreenX - pad &&
           sx <= lay._quoteScreenX + lay._quoteScreenW + pad &&
           sy >= lay._quoteScreenY - pad &&
           sy <= lay._quoteScreenY + lay._quoteScreenH + pad;
  }

  // Hit-test wikilink words inside the current editorial card. Link hitboxes are
  // populated every frame by drawStyledJustifiedLine, so they match the visible
  // text exactly — including across justified lines and exclusion-zone fragments.
  function linkAt(sx, sy) {
    if (editorialFade < 0.5 || !editorialNodeId) return null;
    var lay = getEditorialLayout(editorialNodeId);
    if (!lay || !lay._linkHitboxes) return null;
    for (var i = 0; i < lay._linkHitboxes.length; i++) {
      var h = lay._linkHitboxes[i];
      if (sx >= h.x && sx <= h.x + h.w && sy >= h.y && sy <= h.y + h.h) {
        return h;
      }
    }
    return null;
  }

  canvas.addEventListener("mousedown", function(e) {
    // Check if mousedown lands on the draggable pull quote BEFORE starting pan.
    var rect0 = canvas.getBoundingClientRect();
    var sx0 = e.clientX - rect0.left, sy0 = e.clientY - rect0.top;
    if (quoteAt(sx0, sy0)) {
      var lay = getEditorialLayout(editorialNodeId);
      if (lay) {
        editorialDraggingQuote = true;
        editorialDragHoverQuote = true;
        // Offset from quote top-left to click point (screen-space)
        editorialDragOffsetX = sx0 - lay._quoteScreenX;
        editorialDragOffsetY = sy0 - lay._quoteScreenY;
        canvas.style.cursor = "grabbing";
        e.preventDefault();
        return;
      }
    }
    dragging = true; didDrag = false;
    dragStartX = e.clientX; dragStartY = e.clientY;
    panStartX = panX; panStartY = panY;
  });

  window.addEventListener("mousemove", function(e) {
    if (mmDragging) return;
    // ── Draggable pull-quote — highest priority ──
    if (editorialDraggingQuote && editorialNodeId) {
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay || !lay.draggableQuote) {
        editorialDraggingQuote = false;
      } else {
        var rectQ = canvas.getBoundingClientRect();
        var sxQ = e.clientX - rectQ.left, syQ = e.clientY - rectQ.top;
        // Convert screen point to body-local (column-relative) coords by removing
        // the same offsets drawEditorial uses for startX / bodyStartY. Since card
        // position is animated via easeAlpha, use the cached layout values directly
        // (drag only runs at alpha === 1 after the fade completes).
        var startX = lay.cardX + lay.padX;
        var bodyStartY = lay.cardY + lay.padY_top + lay.headerH;
        var newLocalX = (sxQ - startX) - editorialDragOffsetX;
        var newLocalY = (syQ - bodyStartY + editorialScrollY) - editorialDragOffsetY;
        // Clamp horizontally: in two-column mode the quote can range over the full
        // inner width (straddle the gap); in single-column mode it stays inside the
        // single column.
        var horizontalRange = lay.useColumns ? lay.innerW : lay.colW;
        var maxX = horizontalRange - lay.pullBlockW;
        if (maxX < 0) maxX = 0;
        if (newLocalX < 0) newLocalX = 0;
        if (newLocalX > maxX) newLocalX = maxX;
        // Clamp inside the body (leave a little breathing room at top/bottom)
        var minY = (lay.dropCapLetter ? lay.dropCapHeight + 6 : 8);
        if (newLocalY < minY) newLocalY = minY;
        // Bottom clamp uses current totalBodyH (which shrinks when the quote pushes text)
        var maxY = Math.max(minY, (lay.totalBodyH || 0) - lay.pullBlockH - 8);
        if (newLocalY > maxY) newLocalY = maxY;
        editorialQuoteX = Math.round(newLocalX);
        editorialQuoteY = Math.round(newLocalY);
        lay._liveQuoteX = editorialQuoteX;
        lay._liveQuoteY = editorialQuoteY;
        // Re-layout body with the new exclusion rect. Cheap: only layoutNextLine runs.
        relayoutEditorialBody(lay);
        canvas.style.cursor = "grabbing";
        scheduleRedraw();
      }
      return;
    }
    if (dragging) {
      var dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
      panX = panStartX + dx; panY = panStartY + dy;
      scheduleRedraw();
      return;
    }
    var rect = canvas.getBoundingClientRect();
    var sx = e.clientX - rect.left, sy = e.clientY - rect.top;

    // Hover the draggable pull quote → grab cursor + subtle border
    if (quoteAt(sx, sy)) {
      if (!editorialDragHoverQuote) {
        editorialDragHoverQuote = true;
        scheduleRedraw();
      }
      canvas.style.cursor = "grab";
      if (hoverId) { hoverId = null; hoverNode = null; hideTooltip(); updateHud(null); scheduleRedraw(); }
      return;
    } else if (editorialDragHoverQuote) {
      editorialDragHoverQuote = false;
      scheduleRedraw();
    }

    // Block node hover detection when over the editorial card — but allow
    // wikilinks and pills (rendered below card) to remain interactive.
    if (editorialFade > 0.5 && editorialNodeId) {
      var elayoutHover = getEditorialLayout(editorialNodeId);
      if (elayoutHover) {
        if (sx >= elayoutHover.cardX && sx <= elayoutHover.cardX + elayoutHover.cardW &&
            sy >= elayoutHover.cardY && sy <= elayoutHover.cardY + elayoutHover.cardH) {
          // Inside card — check wikilinks first, then pills, then block the rest.
          var linkHitInside = linkAt(sx, sy);
          if (linkHitInside) {
            canvas.style.cursor = "pointer";
            if (hoverId) { hoverId = null; hoverNode = null; hideTooltip(); updateHud(null); scheduleRedraw(); }
            return;
          }
          var pillHitCard = pillAt(sx, sy);
          canvas.style.cursor = pillHitCard ? "pointer" : "default";
          if (hoverId) { hoverId = null; hoverNode = null; hideTooltip(); updateHud(null); scheduleRedraw(); }
          return;
        }
      }
    }

    // Check for pill hover in editorial mode
    var pillHit = pillAt(sx, sy);
    if (pillHit) {
      canvas.style.cursor = "pointer";
      return;
    }

    var hit = nodeAt(sx, sy);
    var newId = hit ? hit.id : null;
    if (newId !== hoverId) {
      hoverId = newId; hoverNode = hit;
      canvas.style.cursor = hit ? "pointer" : "grab";
      if (hit) { showTooltip(hit, e.clientX, e.clientY); updateHud(hit); }
      else { hideTooltip(); updateHud(null); }
      scheduleRedraw();
    } else if (hit) {
      showTooltip(hit, e.clientX, e.clientY);
    }
  });

  window.addEventListener("mouseup", function(e) {
    dragging = false;
    if (editorialDraggingQuote) {
      editorialDraggingQuote = false;
      // Keep hover state in sync for the next mousemove
      var rectU = canvas.getBoundingClientRect();
      var sxU = e.clientX - rectU.left, syU = e.clientY - rectU.top;
      editorialDragHoverQuote = quoteAt(sxU, syU);
      canvas.style.cursor = editorialDragHoverQuote ? "grab" : "default";
      scheduleRedraw();
    }
  });

  canvas.addEventListener("click", function(e) {
    if (didDrag) return;
    var rect = canvas.getBoundingClientRect();
    var sx = e.clientX - rect.left, sy = e.clientY - rect.top;

    // Swallow clicks on (or just-dragged) the pull quote so they don't exit editorial.
    if (quoteAt(sx, sy)) return;

    // Wikilink click → navigate to that page's HTML. Must come before the pill
    // check because pill hitboxes are rendered outside the card but wikilinks
    // live inside the card body.
    var linkHit = linkAt(sx, sy);
    if (linkHit && linkHit.slug) {
      window.location = linkHit.slug + ".html";
      return;
    }

    // Check pill clicks first (editorial mode navigation)
    var pill = pillAt(sx, sy);
    if (pill) {
      selectedNodeId = pill.id;
      // Clear pill hitboxes
      for (var ni = 0; ni < nodes.length; ni++) nodes[ni]._hasPill = false;
      editorialLayoutCache = {};
      editorialFade = 0;
      editorialFadeTarget = 0;
      editorialScrollY = 0;
      closeAllPanels();
      zoomToNode(pill, 5.0);
      updateHud(pill);
      scheduleRedraw();
      return;
    }

    var hit = nodeAt(sx, sy);
    if (hit) {
      selectedNodeId = hit.id;
      updateHud(hit);
      // In editorial zoom range, don't open side panel — editorial surface IS the panel
      if (zoom < ZOOM_EDITORIAL_THRESHOLD) {
        openPanel(hit.id);
      }
      scheduleRedraw();
    } else {
      // Click on empty space or dark overlay: close all panels, exit editorial
      if (stackPanels.length > 0) closeAllPanels();
      if (editorialFade > 0.01) {
        // Smooth exit from editorial mode
        editorialFadeTarget = 0;
        forceEditorial = false;
        editorialScrollY = 0;
        editorialFadeStart = editorialFade;
        editorialFadeStartTime = performance.now();
        for (var ni = 0; ni < nodes.length; ni++) nodes[ni]._hasPill = false;
        selectedNodeId = null;
        editorialNodeId = null;
        updateHud(null);
        scheduleRedraw();
        return;
      }
      selectedNodeId = null;
      editorialNodeId = null;
      editorialFadeTarget = 0;
      forceEditorial = false;
      editorialScrollY = 0;
      editorialFadeStart = editorialFade;
      editorialFadeStartTime = performance.now();
      for (var ni = 0; ni < nodes.length; ni++) nodes[ni]._hasPill = false;
      updateHud(null);
      scheduleRedraw();
    }
  });

  canvas.addEventListener("dblclick", function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    var hit = nodeAt(sx, sy);
    if (hit) {
      // Double-click enters editorial mode instantly — no zoom animation.
      // The pretext.js typography card fades in without the jarring zoom.
      selectedNodeId = hit.id;
      closeAllPanels();
      editorialLayoutCache = {};
      editorialScrollY = 0;
      forceEditorial = true;
      updateHud(hit);
      updateEditorialState();
      scheduleRedraw();
    }
  });

  canvas.addEventListener("mouseleave", function() {
    if (hoverId) { hoverId = null; hoverNode = null; hideTooltip(); scheduleRedraw(); }
  });

  canvas.addEventListener("wheel", function(e) {
    e.preventDefault();

    // In editorial mode: wheel scrolls the card content instead of zooming the map
    if (editorialFade > 0.5 && editorialNodeId) {
      var layout = getEditorialLayout(editorialNodeId);
      if (layout) {
        var maxScroll = Math.max(0, (layout.contentH || layout.cardH) - layout.cardH);
        if (maxScroll > 0) {
          editorialScrollY = Math.max(0, Math.min(maxScroll, editorialScrollY + e.deltaY));
          scheduleRedraw();
          return;
        }
      }
    }

    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left, my = e.clientY - rect.top;
    var factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    var nz = Math.max(0.08, Math.min(8, zoom * factor));
    var npx = mx - (mx - panX) * (nz / zoom), npy = my - (my - panY) * (nz / zoom);
    animateTo(nz, npx, npy, 80);

    // Smoothly exit editorial mode when zooming out past threshold
    if (nz < ZOOM_EDITORIAL_THRESHOLD && editorialFade > 0) {
      editorialFadeTarget = 0;
      forceEditorial = false;
      editorialScrollY = 0;
      editorialFadeStart = editorialFade;
      editorialFadeStartTime = performance.now();
      for (var ni = 0; ni < nodes.length; ni++) nodes[ni]._hasPill = false;
      scheduleRedraw();
    }
  }, { passive: false });

  // ── Keyboard ──
  document.addEventListener("keydown", function(e) {
    if (document.activeElement === searchInput) return;
    if (e.key === "/" || (e.key === "f" && (e.metaKey || e.ctrlKey))) {
      e.preventDefault(); searchInput.focus(); return;
    }
    if (e.key === "Escape") {
      selectedNodeId = null; searchHighlightId = null;
      editorialNodeId = null;
      editorialFadeTarget = 0;
      forceEditorial = false;
      editorialScrollY = 0;
      editorialFadeStart = editorialFade;
      editorialFadeStartTime = performance.now();
      for (var ni = 0; ni < nodes.length; ni++) nodes[ni]._hasPill = false;
      if (searchInput) searchInput.value = "";
      closeAllPanels();
      updateHud(null);
      scheduleRedraw();
      return;
    }
    if (e.key === "Enter" && selectedNodeId) {
      var node = nodeById[selectedNodeId];
      if (node && node.href) window.location = node.href;
      return;
    }

    // ── Editorial scroll keys ──
    if ((forceEditorial || editorialFade > 0.5) && editorialNodeId) {
      var scrollKey = null;
      var scrollDelta = 0;
      if (e.key === "ArrowDown") { scrollDelta = 60; scrollKey = true; }
      else if (e.key === "ArrowUp") { scrollDelta = -60; scrollKey = true; }
      else if (e.key === "PageDown" || e.key === " " || e.key === "Space") { scrollDelta = H * 0.8; scrollKey = true; }
      else if (e.key === "PageUp") { scrollDelta = -H * 0.8; scrollKey = true; }
      else if (e.key === "Home") { editorialScrollY = 0; e.preventDefault(); scheduleRedraw(); return; }
      else if (e.key === "End") {
        var elayout = getEditorialLayout(editorialNodeId);
        if (elayout) editorialScrollY = Math.max(0, (elayout.contentH || elayout.cardH) - elayout.cardH);
        e.preventDefault(); scheduleRedraw(); return;
      }
      if (scrollKey) {
        e.preventDefault();
        var elayout2 = getEditorialLayout(editorialNodeId);
        if (elayout2) {
          var maxScroll = Math.max(0, (elayout2.contentH || elayout2.cardH) - elayout2.cardH);
          editorialScrollY = Math.max(0, Math.min(maxScroll, editorialScrollY + scrollDelta));
          scheduleRedraw();
        }
        return;
      }
    }

    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.key) !== -1) {
      e.preventDefault();
      if (!selectedNodeId) {
        for (var i = 0; i < nodes.length; i++) {
          if (!hiddenNodes.has(nodes[i].id)) {
            selectedNodeId = nodes[i].id; panToNode(nodes[i]); updateHud(nodes[i]); scheduleRedraw(); return;
          }
        }
        return;
      }
      var cur = nodeById[selectedNodeId];
      if (!cur) return;
      var nids = neighbors[selectedNodeId];
      if (!nids) return;
      var best = null, bestD = Infinity;
      // First pass: direction + distance
      for (var nid in nids) {
        if (hiddenNodes.has(nid)) continue;
        var n = nodeById[nid]; if (!n) continue;
        var dx = n._wx - cur._wx, dy = n._wy - cur._wy;
        var d = Math.sqrt(dx * dx + dy * dy);
        var ok = false;
        switch (e.key) {
          case "ArrowRight": ok = dx > 0 && Math.abs(dx) > Math.abs(dy) * 0.5; break;
          case "ArrowLeft":  ok = dx < 0 && Math.abs(dx) > Math.abs(dy) * 0.5; break;
          case "ArrowDown":  ok = dy > 0 && Math.abs(dy) > Math.abs(dx) * 0.5; break;
          case "ArrowUp":    ok = dy < 0 && Math.abs(dy) > Math.abs(dx) * 0.5; break;
        }
        if (ok && d < bestD) { best = n; bestD = d; }
      }
      // Fallback: less strict
      if (!best) {
        for (var nid in nids) {
          if (hiddenNodes.has(nid)) continue;
          var n = nodeById[nid]; if (!n) continue;
          var dx = n._wx - cur._wx, dy = n._wy - cur._wy;
          var d = Math.sqrt(dx * dx + dy * dy);
          var ok = false;
          switch (e.key) {
            case "ArrowRight": ok = dx > 0; break;
            case "ArrowLeft":  ok = dx < 0; break;
            case "ArrowDown":  ok = dy > 0; break;
            case "ArrowUp":    ok = dy < 0; break;
          }
          if (ok && d < bestD) { best = n; bestD = d; }
        }
      }
      if (best) {
        selectedNodeId = best.id;
        panToNode(best);
        updateHud(best);
        scheduleRedraw();
      }
    }
  });

  // ── Legend ──
  function buildLegend(stats) {
    var legendEl = document.getElementById("legend-items");
    var resetBtn = document.getElementById("legend-reset");
    var order = ["question", "concept", "entity", "source", "special"];
    var activeCats = order.filter(function(c) { return stats[c] > 0; });

    for (var i = 0; i < order.length; i++) {
      var cat = order[i], count = stats[cat] || 0;
      if (!count) continue;
      (function(cat, count) {
        var li = document.createElement("li");
        var brk = BRACKETS[cat] || ["[", "]"];
        li.innerHTML =
          '<span class="dot" style="background:' + COLORS[cat] + '"></span>' +
          '<span class="bracket">' + escapeHtml(brk[0] + " " + brk[1]) + '</span>' +
          '<span>' + (CATEGORY_LABELS[cat] || cat) + '</span>' +
          '<span class="count">' + count + '</span>';
        li.addEventListener("click", function() {
          if (activeCategories.has(cat)) activeCategories.delete(cat);
          else activeCategories.add(cat);
          li.classList.toggle("dimmed", !activeCategories.has(cat));
          resetBtn.style.display = activeCategories.size === activeCats.length ? "none" : "block";
          applyFilter();
        });
        legendEl.appendChild(li);
      })(cat, count);
    }
    resetBtn.addEventListener("click", function() {
      activeCategories = new Set(Object.keys(COLORS));
      var items = legendEl.querySelectorAll("li");
      for (var j = 0; j < items.length; j++) items[j].classList.remove("dimmed");
      resetBtn.style.display = "none";
      applyFilter();
    });
  }

  // ── Zoom controls ──
  var zoomLevelLabel = document.getElementById("zoom-level-label");

  function updateZoomLabel() {
    if (zoomLevelLabel) zoomLevelLabel.textContent = zoom.toFixed(1) + "x";
  }

  document.getElementById("zoom-in-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    var nz = Math.min(8, zoom * 1.5);
    animateTo(nz, W / 2 - ((W / 2 - panX) / zoom) * nz, H / 2 - ((H / 2 - panY) / zoom) * nz, 300);
  });

  document.getElementById("zoom-out-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    var nz = Math.max(0.08, zoom / 1.5);
    animateTo(nz, W / 2 - ((W / 2 - panX) / zoom) * nz, H / 2 - ((H / 2 - panY) / zoom) * nz, 300);
    // Exit editorial if zooming below threshold
    if (nz < ZOOM_EDITORIAL_THRESHOLD && editorialFade > 0) {
      editorialFadeTarget = 0;
      forceEditorial = false;
      editorialScrollY = 0;
      editorialFadeStart = editorialFade;
      editorialFadeStartTime = performance.now();
      for (var ni = 0; ni < nodes.length; ni++) nodes[ni]._hasPill = false;
    }
  });

  document.getElementById("zoom-fit-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    // Exit editorial mode
    if (editorialFade > 0) {
      editorialFadeTarget = 0;
      forceEditorial = false;
      editorialScrollY = 0;
      editorialFadeStart = editorialFade;
      editorialFadeStartTime = performance.now();
      editorialNodeId = null;
      for (var ni = 0; ni < nodes.length; ni++) nodes[ni]._hasPill = false;
    }
    selectedNodeId = null;
    // Recalculate center view as animation target
    if (!nodes.length) return;
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      if (hiddenNodes.has(n.id)) continue;
      minX = Math.min(minX, n._wx - n._boxW / 2);
      maxX = Math.max(maxX, n._wx + n._boxW / 2);
      minY = Math.min(minY, n._wy - n._boxH / 2);
      maxY = Math.max(maxY, n._wy + n._boxH / 2);
    }
    if (minX === Infinity) return;
    var cw = maxX - minX, ch = maxY - minY, pad = 80;
    var fitZoom = Math.min((W - pad * 2) / cw, (H - pad * 2) / ch, 1.5);
    fitZoom = Math.max(fitZoom, 0.15);
    var fitPanX = W / 2 - (minX + cw / 2) * fitZoom;
    var fitPanY = H / 2 - (minY + ch / 2) * fitZoom;
    animateTo(fitZoom, fitPanX, fitPanY, 400);
    updateHud(null);
    scheduleRedraw();
  });

  document.getElementById("zoom-read-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    var target = null;
    if (selectedNodeId) {
      target = nodeById[selectedNodeId];
    } else {
      // Find most-connected node
      var bestCount = 0;
      for (var i = 0; i < nodes.length; i++) {
        if (hiddenNodes.has(nodes[i].id)) continue;
        var nids = neighbors[nodes[i].id] || {};
        var count = Object.keys(nids).length;
        if (count > bestCount) { bestCount = count; target = nodes[i]; }
      }
    }
    if (target) {
      selectedNodeId = target.id;
      editorialLayoutCache = {};
      editorialScrollY = 0;
      closeAllPanels();
      zoomToNode(target, 5.0);
      updateHud(target);
      scheduleRedraw();
    }
  });

  // ── Test hook (Playwright only) — deterministic entry into editorial mode ──
  window.__wikiwiseTest__ = {
    enterEditorial: function (nodeId) {
      if (!nodeById[nodeId]) return false;
      selectedNodeId = nodeId;
      closeAllPanels();
      editorialLayoutCache = {};
      editorialQuoteInitialized = false;
      editorialScrollY = 0;
      forceEditorial = true;
      editorialFade = 1;
      editorialFadeTarget = 1;
      editorialNodeId = nodeId;
      updateHud(nodeById[nodeId]);
      updateEditorialState();
      scheduleRedraw();
      return true;
    },
    getQuoteScreenRect: function () {
      if (!editorialNodeId) return null;
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay || typeof lay._quoteScreenX !== "number") return null;
      return {
        x: lay._quoteScreenX,
        y: lay._quoteScreenY,
        w: lay._quoteScreenW,
        h: lay._quoteScreenH,
        localX: editorialQuoteX,
        localY: editorialQuoteY,
        initialX: lay.initialQuoteX,
        initialY: lay.initialQuoteY,
      };
    },
    getLayoutSummary: function () {
      if (!editorialNodeId) return null;
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay) return null;
      var col1Samples = [];
      var col2Samples = [];
      function collect(block, out) {
        if (block.isHeader) return;
        for (var li = 0; li < block.lines.length; li++) {
          var ln = block.lines[li];
          out.push({ y: ln.y, x: ln.x, w: ln.lineW, side: ln.side, text: (ln.text || "").slice(0, 30) });
        }
      }
      if (lay.useColumns && lay.col1Blocks && lay.col2Blocks) {
        for (var bi = 0; bi < lay.col1Blocks.length; bi++) collect(lay.col1Blocks[bi], col1Samples);
        for (var bi2 = 0; bi2 < lay.col2Blocks.length; bi2++) collect(lay.col2Blocks[bi2], col2Samples);
      } else if (lay.bodyBlocks) {
        for (var bi3 = 0; bi3 < lay.bodyBlocks.length; bi3++) collect(lay.bodyBlocks[bi3], col1Samples);
      }
      return {
        useColumns: lay.useColumns,
        draggableQuote: lay.draggableQuote,
        cardX: lay.cardX,
        cardY: lay.cardY,
        colW: lay.colW,
        innerW: lay.innerW,
        colGap: lay.colGap,
        totalBodyH: lay.totalBodyH,
        pullBlockW: lay.pullBlockW,
        pullBlockH: lay.pullBlockH,
        targetHalfForTwoCol: lay.targetHalfForTwoCol,
        lineCount: col1Samples.length + col2Samples.length,
        col1LineCount: col1Samples.length,
        col2LineCount: col2Samples.length,
        firstLines: col1Samples.slice(0, 30),
        col1Lines: col1Samples,
        col2Lines: col2Samples,
      };
    },
    getPullQuote: function () {
      if (!editorialNodeId) return null;
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay) return null;
      var lines = lay.pullQuoteLines || [];
      var text = lines.map(function (l) { return l.text || ""; }).join(" ").trim();
      return {
        text: text,
        lineCount: lines.length,
        useColumns: lay.useColumns || false,
        initialQuoteX: lay.initialQuoteX,
        initialQuoteY: lay.initialQuoteY,
        pullBlockW: lay.pullBlockW,
        pullBlockH: lay.pullBlockH,
        colW: lay.colW,
        innerW: lay.innerW,
        lineWidths: lines.map(function (l) { return l.width || 0; }),
        lineCenterDx: lines.map(function (l) { return l._centerDx || 0; }),
        lineTexts: lines.map(function (l) { return l.text || ""; }),
      };
    },
    getLinkHitboxes: function () {
      if (!editorialNodeId) return null;
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay) return null;
      return (lay._linkHitboxes || []).map(function (h) {
        return { x: h.x, y: h.y, w: h.w, h: h.h, slug: h.slug, display: h.display };
      });
    },
    getBlocks: function () {
      if (!editorialNodeId) return null;
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay) return null;
      function pack(blocks) {
        return (blocks || []).map(function (b) {
          return {
            isHeader: !!b.isHeader,
            isDropCapPara: !!b.isDropCapPara,
            startY: b.startY,
            endY: b.endY,
            spaceAbove: b.spaceAbove,
            spaceBelow: b.spaceBelow,
            firstLineText: (b.lines && b.lines[0] && b.lines[0].text || "").slice(0, 40),
          };
        });
      }
      return {
        useColumns: lay.useColumns,
        bodyBlocks: pack(lay.bodyBlocks),
        col1Blocks: pack(lay.col1Blocks),
        col2Blocks: pack(lay.col2Blocks),
      };
    },
    listNodeIds: function () {
      if (typeof nodes === "undefined" || !nodes) return [];
      return nodes.map(function (n) { return n.id; });
    },
    openPanelForTest: function (nodeId) {
      // Directly open the sidebar panel for a node, bypassing the
      // canvas-click path. Used by headless audits that can't find
      // the node's screen position by pixel scan. Fires the same
      // render path (openPanel → formatRich / formatLead).
      if (!nodeById[nodeId]) return false;
      selectedNodeId = nodeId;
      updateHud(nodeById[nodeId]);
      openPanel(nodeId);
      scheduleRedraw();
      return true;
    },
    closeAllPanelsForTest: function () {
      closeAllPanels();
      scheduleRedraw();
      return true;
    },
  };

  // ── Boot ──
  Promise.resolve().then(function() {
    // Prefer inlined data (works on file://); fall back to fetch (for live dev server)
    if (window.__MAP_DATA__) {
      return [window.__MAP_DATA__, window.__PREVIEWS_DATA__ || {}, window.__GRAPH_DATA__ || { links: [] }];
    }
    return Promise.all([
      fetch("map.json").then(function(r) { return r.json(); }),
      fetch("previews.json").then(function(r) { return r.json(); }).catch(function() { return {}; }),
      fetch("graph.json").then(function(r) { return r.json(); }).catch(function() { return { links: [] }; }),
    ]);
  }).then(function(results) {
    var mapData = results[0];
    previews = results[1];
    var graphData = results[2];
    nodes = mapData.nodes;
    edges = mapData.edges;
    computeEdgeWeights(graphData.links);

    for (var i = 0; i < nodes.length; i++) {
      nodeById[nodes[i].id] = nodes[i];
      neighbors[nodes[i].id] = {};
    }
    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      if (neighbors[e.source]) neighbors[e.source][e.target] = true;
      if (neighbors[e.target]) neighbors[e.target][e.source] = true;
    }

    buildLegend(mapData.stats);
    updateStats();
    resize();
    layoutNodes();
    centerView();
    setupMinimap();
    scheduleRedraw();

    window.addEventListener("resize", function() {
      resize(); editorialLayoutCache = {}; layoutNodes(); scheduleRedraw(); setupMinimap();
    });
  }).catch(function(err) {
    var isFile = window.location.protocol === 'file:';
    var canvas = document.getElementById("map-canvas");
    var rect = canvas.parentElement.getBoundingClientRect();
    var W = rect.width, H = rect.height;
    var dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    var ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#0a1214";
    ctx.fillRect(0, 0, W, H);
    ctx.font = "600 18px 'JetBrains Mono', monospace";
    ctx.fillStyle = "#C4813D";
    ctx.textAlign = "center";
    ctx.fillText(isFile ? "Cannot load map data from file:// protocol" : "Failed to load map data", W/2, H/2 - 20);
    ctx.font = "14px 'JetBrains Mono', monospace";
    ctx.fillStyle = "rgba(250, 240, 230, 0.5)";
    ctx.fillText(isFile ? "Run: cd site && python3 -m http.server 8799 --directory out" : err.message || "Check the console for details", W/2, H/2 + 10);
    ctx.fillText(isFile ? "Then open http://localhost:8799/map.html" : "", W/2, H/2 + 35);
  });
})();
</script>
</body>
</html>
