<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #fbfaf5; }
  @media (prefers-color-scheme: dark) {
    html, body { background: #1E1B14; color: #F4EACF; }
    .cm-editor { background: #1E1B14; }
    .cm-editor .cm-content { color: #F4EACF; caret-color: #C2A96B; }
    .cm-editor .cm-gutters { background: #0E0C08; color: #6F6450; border-right-color: #2A2419; }
    .cm-editor .cm-activeLineGutter { background: #1E1B14; }
    .cm-editor .cm-activeLine { background: #1E1B1480; }
    .cm-editor .cm-selectionBackground, .cm-editor ::selection { background: #C2A96B30 !important; }
    .cm-editor .cm-cursor { border-left-color: #C2A96B; }
  }
  #editor { height: 100%; }
  .cm-editor { height: 100%; }
  .cm-scroller { overflow: auto !important; }
</style>
</head>
<body>
<div id="editor"></div>
<script src="codemirror-bundle.js"></script>
<script>
// Scroll fraction helpers for preserving position across view switches.
// CodeMirror scrolls inside .cm-scroller, not the window.
function __getScrollFraction() {
  var s = document.querySelector('.cm-scroller');
  if (!s) return 0;
  var max = s.scrollHeight - s.clientHeight;
  return max > 0 ? s.scrollTop / max : 0;
}
function __scrollToFraction(f) {
  var s = document.querySelector('.cm-scroller');
  if (!s) return;
  var max = s.scrollHeight - s.clientHeight;
  s.scrollTop = f * max;
}
</script>
</body>
</html>
